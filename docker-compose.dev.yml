# Local stack per docs/ARCHITECTURE_DEPLOYMENT_COST_MODEL.md §7
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: sonara
      POSTGRES_DB: sonara_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  storage:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sonara
      MINIO_ROOT_PASSWORD: sonara123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
